name: Deploy to Production

on:
  workflow_dispatch:

concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      KINSTAPROD_HOST: ${{ secrets.KINSTAPROD_HOST }}
      KINSTAPROD_USER: ${{ secrets.KINSTAPROD_USER }}
      KINSTAPROD_PORT: ${{ secrets.KINSTAPROD_PORT }}
      KINSTAPROD_SSH_KEY: ${{ secrets.KINSTAPROD_SSH_KEY }}
      KINSTAPROD_PLUGINS_BASE: ${{ secrets.KINSTAPROD_PLUGINS_BASE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ env.KINSTAPROD_SSH_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${KINSTAPROD_PORT:-22}" "${KINSTAPROD_HOST}" >> ~/.ssh/known_hosts

      - name: Resolve deploy path
        run: |
          REMOTE_PATH="${KINSTAPROD_PLUGINS_BASE%/}/hp-pdf-invoices"
          echo "DEPLOY_PATH=$REMOTE_PATH" >> $GITHUB_ENV

      - name: Deploy to Production
        run: |
          rsync -avz --delete \
            --exclude='.git*' \
            --exclude='.cursor*' \
            --exclude='.github*' \
            -e "ssh -p ${KINSTAPROD_PORT}" \
            ./ "${KINSTAPROD_USER}@${KINSTAPROD_HOST}:${DEPLOY_PATH}/"

      - name: Flush Cache
        run: |
          ssh -p "${KINSTAPROD_PORT}" "${KINSTAPROD_USER}@${KINSTAPROD_HOST}" "cd $(dirname $(dirname ${DEPLOY_PATH})) && wp cache flush"
